[scan]
delay_min_seconds = 2.0
delay_max_seconds = 4.0
max_stale_days = 10
skip_if_no_today_data = true

[thresholds]
high_percentile = 85
low_percentile = 30

[windows]
d21 = 21
d63 = 63
y1 = 252
y3 = 756

[wechat]
webhook_env = "WECHAT_WEBHOOK_URL"
max_message_chars = 3300
send_when_no_alert = false

[degrade]
enabled = true
max_run_seconds = 240
max_fail_ratio = 0.25
min_samples = 20


name: daily-commodity-monitor

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Run profile"
        required: true
        default: core
        type: choice
        options:
          - core
          - extended
      dry_run:
        description: "Dry run only (no webhook push)"
        required: true
        default: false
        type: boolean
      max_symbols:
        description: "Optional max symbols limit for debug (e.g. 20)"
        required: false
        type: string
  schedule:
    # Beijing 04:17 = UTC 20:17 (previous day)
    - cron: "17 20 * * 0-4"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          MONITOR_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'core' }}
          MONITOR_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          MONITOR_MAX_SYMBOLS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_symbols || '' }}
        run: |
          python scripts/run_daily_monitor.py \
            --profile "${MONITOR_PROFILE}" \
            ${MONITOR_MAX_SYMBOLS:+--max-symbols ${MONITOR_MAX_SYMBOLS}} \
            --check-only

          if [ "${MONITOR_DRY_RUN}" = "true" ]; then
            python scripts/run_daily_monitor.py \
              --profile "${MONITOR_PROFILE}" \
              ${MONITOR_MAX_SYMBOLS:+--max-symbols ${MONITOR_MAX_SYMBOLS}} \
              --dry-run
          else
            python scripts/run_daily_monitor.py \
              --profile "${MONITOR_PROFILE}" \
              ${MONITOR_MAX_SYMBOLS:+--max-symbols ${MONITOR_MAX_SYMBOLS}}
          fi
